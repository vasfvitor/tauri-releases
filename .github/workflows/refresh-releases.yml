name: Refresh release data

on:
  schedule:
    - cron: "00 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-release-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --filter releases-generator --frozen-lockfile

      - name: Refresh release data
        run: pnpm --filter releases-generator run refresh

      - name: Open release refresh PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: refresh release data"
          title: "chore: refresh release data"
          body: |
            release data refresh.
          branch: automated/refresh-release-data
          delete-branch: true
          add-paths: |
            packages/releases-generator/generated/data.json
            packages/releases-generator/generated/latestVersions.ts
            src/content/**
